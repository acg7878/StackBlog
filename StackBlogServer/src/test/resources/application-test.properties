# 测试环境配置

# H2内存数据库配置（单元测试）
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA配置
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT配置（测试用）
jwt.secret=test-secret-key-for-unit-testing-min-256-bits-long
jwt.expiration=3600000

# Jackson配置
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# 禁用Redis（测试环境）
spring.data.redis.repositories.enabled=false
spring.cache.type=none

# 日志配置
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.derek.stackblog=DEBUG
